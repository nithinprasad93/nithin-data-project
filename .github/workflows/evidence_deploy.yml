name: Deploy Evidence.dev

on:
  workflow_run:
    workflows: ["dbt Transform"]
    types: [completed]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'evidence/pages/**'
      - 'evidence/sources/**'

jobs:
  deploy:
    name: Trigger Vercel deploy
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Vercel deploy hook
        run: curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":chart_with_upwards_trend: *Evidence.dev deploy triggered*\nDashboard will update shortly.\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Evidence.dev deploy FAILED*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
