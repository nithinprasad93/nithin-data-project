name: Daily Data Seed

on:
  schedule:
    - cron: '0 12 * * 1-5'
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD). Defaults to yesterday.'
        required: false
        default: ''
      backfill_days:
        description: 'Number of days to backfill (0 = single day)'
        required: false
        default: '0'

jobs:
  seed:
    name: Seed daily NDIS data
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SNOWFLAKE_ACCOUNT:   ${{ secrets.SNOWFLAKE_ACCOUNT }}
      SNOWFLAKE_USER:      ${{ secrets.SNOWFLAKE_USER_LOADER }}
      SNOWFLAKE_PASSWORD:  ${{ secrets.SNOWFLAKE_PASSWORD_LOADER }}
      SNOWFLAKE_ROLE:      NDIS_LOADER
      SNOWFLAKE_DATABASE:  NDIS_DB
      SNOWFLAKE_SCHEMA:    RAW
      SNOWFLAKE_WAREHOUSE: NDIS_WH

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily seeder
        id: seeder
        run: |
          DATE_ARG=""
          BACKFILL_ARG=""
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.target_date }}"
          fi
          if [ "${{ github.event.inputs.backfill_days }}" != "0" ] && [ -n "${{ github.event.inputs.backfill_days }}" ]; then
            BACKFILL_ARG="--backfill-days ${{ github.event.inputs.backfill_days }}"
          fi
          python -m ingestion.seeder.seed_daily $DATE_ARG $BACKFILL_ARG

      - name: Compute duration
        id: duration
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.timer.outputs.start }}
          echo "value=$(( (END - START) / 60 ))m $(( (END - START) % 60 ))s" >> $GITHUB_OUTPUT

      - name: Slack — success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":white_check_mark: *Daily Seed SUCCEEDED* — `${{ github.repository }}`\n*Date seeded:* ${{ github.event.inputs.target_date || 'yesterday' }}  |  *Duration:* ${{ steps.duration.outputs.value }}  |  *Actor:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack — failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Daily Seed FAILED* — `${{ github.repository }}`\n*Date:* ${{ github.event.inputs.target_date || 'yesterday' }}  |  *Duration:* ${{ steps.duration.outputs.value }}  |  *Actor:* ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Email — success
        if: success()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
        run: |
          python scripts/notify_email.py \
            --subject "✅ Daily Seed SUCCEEDED — $(date +%Y-%m-%d)" \
            --body "The daily NDIS data seed completed successfully. New data is now available in Snowflake RAW layer." \
            --status success \
            --workflow "Daily Data Seed" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --branch "${{ github.ref_name }}" \
            --actor "${{ github.actor }}" \
            --trigger "${{ github.event_name }}" \
            --duration "${{ steps.duration.outputs.value }}" \
            --extra \
              "Seed date=${{ github.event.inputs.target_date || 'yesterday' }}" \
              "Backfill days=${{ github.event.inputs.backfill_days || '0' }}" \
              "Python version=3.12" \
              "Snowflake warehouse=NDIS_WH" \
              "Target schema=RAW"

      - name: Email — failure
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL:   ${{ secrets.NOTIFY_EMAIL }}
        run: |
          python scripts/notify_email.py \
            --subject "❌ Daily Seed FAILED — $(date +%Y-%m-%d)" \
            --body "The daily NDIS seed job failed. Check the GitHub Actions logs to identify the failing step." \
            --status failure \
            --workflow "Daily Data Seed" \
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --repo "${{ github.repository }}" \
            --run-id "${{ github.run_id }}" \
            --branch "${{ github.ref_name }}" \
            --actor "${{ github.actor }}" \
            --trigger "${{ github.event_name }}" \
            --duration "${{ steps.duration.outputs.value }}" \
            --extra \
              "Seed date=${{ github.event.inputs.target_date || 'yesterday' }}" \
              "Backfill days=${{ github.event.inputs.backfill_days || '0' }}" \
              "Python version=3.12" \
              "Snowflake warehouse=NDIS_WH" \
              "Target schema=RAW"
